name: CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build:
    uses: ./.github/workflows/java-build.yml
    secrets: inherit

  sonar:
    needs: build
    uses: ./.github/workflows/sonar.yml
    secrets: inherit

  image-push:
    needs: sonar
    uses: ./.github/workflows/image-push.yml
    secrets: inherit